<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Port Search</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="theme-color" content="#B71C1C">

  <!-- Browser tab favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23B71C1C'/><text x='50' y='69' font-family='Segoe UI,Arial,sans-serif' font-size='52' font-weight='700' fill='white' text-anchor='middle'>PS</text></svg>" />

  <!-- Android / PWA install -->
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- iOS home-screen install -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Port Search" />
</head>
<body>
  <header class="app-bar">
    <div class="app-bar-left">
      <h1 class="app-bar-title">Port Search</h1>
    </div>
    <span class="app-bar-pill" id="portCountPill"></span>
  </header>

  <main>
    <section id="searchScreen" class="screen">
      <div class="search-toolbar">
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search by airport name, IATA/ICAO code, city or country…"
          autocomplete="off"
          enterkeyhint="search"
          aria-label="Search airports"
        />
      </div>

      <p class="results-meta" id="resultsMeta" aria-live="polite"></p>

      <div class="port-card legend-card" aria-label="Airport code legend">
        <span class="port-code">
          IATA
          <span class="port-code-alt">ICAO</span>
        </span>
        <div class="port-info">
          <div class="port-name">IATA &middot; International Air Transport Association</div>
          <div class="port-sub">ICAO &middot; International Civil Aviation Organization</div>
        </div>
      </div>

      <div id="resultsList" class="results-list"></div>
    </section>
  </main>

  <script src="airports-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
